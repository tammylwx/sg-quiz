<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which SG Viral Trend R U?</title>
<style>
  :root {
    --bg: #FFF9E6;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-soft: #666666;
    --accent: #FF4D00;
    --accent-soft: #FFE0D0;
    --border: #E8E0D0;
    --shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
    --shadow-hover: 0 4px 30px rgba(255, 77, 0, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  .quiz-container {
    max-width: 480px;
    width: 100%;
    position: relative;
  }

  /* ── SCREENS ── */
  .screen {
    display: none;
    animation: fadeSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .screen.active { display: block; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeSlideOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-20px); }
  }

  .screen.exiting {
    display: block;
    animation: fadeSlideOut 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── INTRO SCREEN ── */
  .intro {
    text-align: center;
    padding: 48px 24px;
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .intro-emoji {
    font-size: 48px;
    margin-bottom: 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .intro-emoji span {
    display: inline-block;
    animation: floatEmoji 3s ease-in-out infinite;
  }
  .intro-emoji span:nth-child(2) { animation-delay: 0.3s; }
  .intro-emoji span:nth-child(3) { animation-delay: 0.6s; }
  .intro-emoji span:nth-child(4) { animation-delay: 0.9s; }
  .intro-emoji span:nth-child(5) { animation-delay: 1.2s; }
  .intro-emoji span:nth-child(6) { animation-delay: 1.5s; }

  @keyframes floatEmoji {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .intro h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2.4rem;
    line-height: 1.15;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .intro h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .intro p {
    color: var(--text-soft);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn-start {
    background: #000000;
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 100px;
    font-family: 'Arial', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }

  .btn-start:active { transform: translateY(0); }

  /* ── QUESTION SCREEN ── */
  .question-card {
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    width: 100%;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    border-radius: 0 4px 4px 0;
  }

  .question-header {
    padding: 32px 28px 0;
  }

  .question-count {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .question-text {
    font-family: 'Instrument Serif', serif;
    font-size: 1.6rem;
    line-height: 1.3;
    letter-spacing: -0.3px;
  }

  .options-list {
    padding: 20px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    font-family: 'Arial', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    line-height: 1.4;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateX(4px);
  }

  .option-btn:active {
    transform: scale(0.98);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    font-weight: 600;
  }

  /* ── RESULT SCREEN ── */
  .result-card {
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    text-align: center;
    overflow: hidden;
  }

  .result-header {
    padding: 40px 28px 20px;
  }

  .result-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
    animation: resultPop 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes resultPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title {
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .result-body {
    padding: 0 28px 32px;
  }

  .result-img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 16px;
    margin: 0 auto 20px;
  }

  .result-desc {
    color: var(--text-soft);
    font-size: 0.92rem;
    line-height: 1.7;
    margin-bottom: 28px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }

  .result-traits {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .trait-tag {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 500;
    background: var(--accent-soft);
    color: var(--accent);
  }

  .result-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-retake {
    background: var(--text);
    color: #fff;
    border: none;
    padding: 14px 32px;
    border-radius: 100px;
    font-family: 'Arial', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .btn-retake:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }

  .btn-share {
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--border);
    padding: 14px 32px;
    border-radius: 100px;
    font-family: 'Arial', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .btn-share:hover {
    border-color: var(--text);
    transform: translateY(-2px);
  }

  /* ── DECORATIVE BG ── */
  .bg-shapes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }

  .bg-shapes::before,
  .bg-shapes::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
  }

  .bg-shapes::before {
    width: 400px; height: 400px;
    background: #FFCC00;
    top: -100px; right: -100px;
  }

  .bg-shapes::after {
    width: 300px; height: 300px;
    background: #FF4D00;
    bottom: -80px; left: -80px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--text-soft);
    opacity: 0.5;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="bg-shapes"></div>

<div class="quiz-container">

  <!-- INTRO -->
  <div class="screen active" id="intro-screen">
    <div class="intro">
      <div class="intro-emoji">
        <span>🍪</span><span>🍦</span><span>🧗</span><span>🎵</span>
      </div>
      <h1>Which viral SG Trend are you?</h1>
      <p>Find out which Singaporean viral trend matches your personality~</p>
      <button class="btn-start" onclick="startQuiz()">Let's go →</button>
    </div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="question-screen">
    <div class="question-card">
      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>
      <div class="question-header">
        <div class="question-count" id="q-count"></div>
        <div class="question-text" id="q-text"></div>
      </div>
      <div class="options-list" id="options"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="result-screen">
    <div class="result-card">
      <div class="result-header">
        <div class="result-label">You are...</div>
        <span class="result-emoji" id="r-emoji"></span>
        <div class="result-title" id="r-title"></div>
      </div>
      <div class="result-body">
        <img class="result-img" id="r-img" src="" alt="" style="display:none;">
        <div class="result-desc" id="r-desc"></div>
        <div class="result-traits" id="r-traits"></div>
        <div class="result-actions">
          <button class="btn-retake" onclick="retake()">Retake Quiz</button>
          <button class="btn-share" onclick="shareResult()">Share Result ✦</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">All rights reserved by Triko Lee</div>
</div>

<div class="toast" id="toast">Link copied!</div>

<script>
// ═══════════════════════════════════════════
//  QUIZ DATA — EDIT THIS TO CUSTOMIZE!
// ═══════════════════════════════════════════

const questions = [
  {
    text: "It's Saturday afternoon, you are...",
    options: [
      { text: "Stuck in a queue for something you saw on your feed", scores: { dubai: 1, labubu: 1, yochi: 1 } },
      { text: "Shopping for cute things you definitely don't need", scores: { labubu: 1, chiikawa: 1 } },
      { text: "Doing something active", scores: { bouldering: 1 } },
      { text: "Home.", scores: { jingxi: 1 } }
    ]
  },
  {
    text: "Your go-to way to destress?",
    options: [
      { text: "Buy a blind box.", scores: { labubu: 1 } },
      { text: "Sweat it out 💪", scores: { bouldering: 1 } },
      { text: "Doomscroll for 25 hours", scores: { chiikawa: 1, jingxi: 1 } },
      { text: "Sweet Treat x 1", scores: { yochi: 1, dubai: 1 } },
    ]
  },
  {
    text: "Lawrence Wong said you gotta pack up and leave. Which country do you choose?",
    options: [
      { text: "Korea onion seyo", scores: { dubai: 1, yochi: 1 } },
      { text: "Japan konicheewa ", scores: { labubu: 1, jingxi: 1, chiikawa: 1 } },
      { text: "Australiaaaa", scores: { bouldering: 1, yochi: 1 } },
      { text: "JB", scores: { jingxi: 1, labubu: 1 } }
   
    ]
  },
  {
    text: "Pick a vibe ✦",
    options: [
      { text: "YOWHODAT", scores: { dubai: 1 } },
      { text: "Simbian Chua", scores: { labubu: 1 } },
      { text: "Steven Lim Kor Kor", scores: { jingxi: 1  } },
      { text: "SGtroller", scores: { labubu: 1, chiikawa: 1} },
      { text: "Glenn Yong", scores: { jingxi: 1  } },
      { text: "Idk anybody here", scores: { yochi: 1, bouldering: 1 } },
    ]
  },

  {
    text: "What's your aesthetic?",
    options: [
      { text: "Brandy Melville", scores: { dubai: 1, yochi: 1} },
      { text: "Blogshops", scores: { labubu: 1, chiikawa: 1, dubai: 1} },
      { text: "Atheleisure", scores: { bouldering: 1 } },
      { text: "Thrifted fit", scores: { chiikawa: 1, dubai: 1 } },
      { text: "Welcome to uniqlo!", scores: { jingxi: 1 } },
      
    ]
  }
];

const results = {
  dubai: {
    emoji: "🍪",
    title: "Dubai Chewy Cookie",
    desc: "You are up to date with trends and you like food. Congrats",
    traits: ["Trendsetter", "FOMO-driven", "Lives to eat", "Main character energy"],
    img: "dubai.png"
  },
  labubu: {
    emoji: "🧸",
    title: "Labubu",
    desc: "How much have you spent on blind boxes? I'm praying for your wallet~",
    traits: ["Collector soul", "Chaotic good", "Quirky", "Blind box addict"],
    img: "labubu.png"
  },
  yochi: {
    emoji: "🍦",
    title: "Yochi",
    desc: "Kinda young, frontal lobe almost finished developing vibe! Cutieful and fresh~",
    traits: ["Social butterfly", "Sweet tooth", "Good vibes only", "The planner"],
    img: "yochi.png"
  },
  bouldering: {
    emoji: "🧗",
    title: "Bouldering",
    desc: "I love that you exercise. Stay fit queen.",
    traits: ["Problem solver", "Quietly competitive", "Strong (inside & out)"],
    img: "bouldering.png"
  },
  jingxi: {
    emoji: "🎵",
    title: "Jingxi Music",
    desc: "You are a national treasure and i love you. Don't ever stop doing what you are doing",
    traits: ["Just a friend", "Nursing a breakup that didn't happen"],
    img: "jingxi.png"
  },
  chiikawa: {
    emoji: "🐻",
    title: "Chiikawa",
    desc: "We are the same. Give me a kiss.",
    traits: ["Wholesome", "Empathetic", "Emotional support friend"],
    img: "chiikawa.png"
  }
};

// ═══════════════════════════════════════════
//  QUIZ ENGINE — No need to edit below
// ═══════════════════════════════════════════

let currentQ = 0;
let scores = {};

function initScores() {
  scores = {};
  Object.keys(results).forEach(k => scores[k] = 0);
}

function startQuiz() {
  initScores();
  currentQ = 0;
  transition('intro-screen', 'question-screen', () => showQuestion());
}

function showQuestion() {
  const q = questions[currentQ];
  document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;
  document.getElementById('q-count').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.style.animationDelay = `${i * 0.05}s`;
    btn.onclick = () => selectOption(opt, btn);
    optionsEl.appendChild(btn);
  });
}

function selectOption(opt, btn) {
  // Add scores
  Object.entries(opt.scores).forEach(([key, val]) => {
    scores[key] = (scores[key] || 0) + val;
  });

  // Visual feedback
  btn.classList.add('selected');
  document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      // Transition within question screen
      const card = document.querySelector('.question-card');
      card.style.animation = 'fadeSlideOut 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards';
      setTimeout(() => {
        showQuestion();
        card.style.animation = 'fadeSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards';
      }, 300);
    } else {
      document.getElementById('progress').style.width = '100%';
      setTimeout(() => showResult(), 400);
    }
  }, 350);
}

function showResult() {
  // Find highest score
  const winner = Object.entries(scores).reduce((a, b) => a[1] >= b[1] ? a : b)[0];
  const r = results[winner];

  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-desc').textContent = r.desc;

  // Show result image
  const imgEl = document.getElementById('r-img');
  if (r.img) {
    imgEl.src = r.img;
    imgEl.alt = r.title;
    imgEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
  }

  const traitsEl = document.getElementById('r-traits');
  traitsEl.innerHTML = '';
  r.traits.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'trait-tag';
    tag.textContent = t;
    traitsEl.appendChild(tag);
  });

  transition('question-screen', 'result-screen');
}

function retake() {
  transition('result-screen', 'intro-screen');
}

function transition(fromId, toId, afterCallback) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);

  from.classList.remove('active');
  from.classList.add('exiting');

  setTimeout(() => {
    from.classList.remove('exiting');
    to.classList.remove('active');
    // Force reflow for animation restart
    void to.offsetWidth;
    to.classList.add('active');
    if (afterCallback) afterCallback();
  }, 300);
}

function shareResult() {
  const winner = Object.entries(scores).reduce((a, b) => a[1] >= b[1] ? a : b)[0];
  const r = results[winner];
  const text = `✨ I got ${r.title} ${r.emoji} in the "Which SG Viral Trend R U?" quiz! Take it here:`;

  if (navigator.share) {
    navigator.share({ title: 'Which SG Viral Trend R U?', text: text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + ' ' + window.location.href).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
}
</script>

</body>
</html>
